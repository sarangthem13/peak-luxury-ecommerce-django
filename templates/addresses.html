{% extends 'base.html' %}

{% block content %}

<div class="container py-5">


<h2>Saved Addresses</h2>

{% for address in addresses %}

<div class="card mb-3">

    <div class="card-body">

        <h5>{{ address.full_name }}</h5>

        <p>
            {{ address.address_line }}
        </p>

        <p>
            {{ address.city }},
            {{ address.state }}
            - {{ address.pincode }}
        </p>

        <p>
            {{ address.phone }}
        </p>

    </div>

</div>

{% empty %}

<p>No addresses added yet.</p>

{% endfor %}


</div>

{% endblock %}
